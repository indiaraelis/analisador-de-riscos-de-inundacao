<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertas de Risco de Inundação</title>
    <!-- Corrigindo o caminho do CSS -->
<link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header>
        <h1>Alertas de Risco de Inundação</h1>
        <p>Saiba o risco de inundação em sua cidade com base nas condições climáticas</p>
    </header>

    <section id="search-section">
        <input type="text" id="city" placeholder="Digite o nome da cidade" />
        <button id="searchButton">Buscar Previsão</button>
    </section>

    <section id="weather-info">
        <h2>Previsão do Tempo</h2>
        <p id="cityName"></p>
        <p id="temperature"></p>
        <p id="humidity"></p>
        <p id="weatherDescription"></p>
        <p id="floodRisk"></p>
    </section>

<!-- Corrigindo o caminho do JS -->
<script src="scripts/script.js"></script>

</body>
</html>
